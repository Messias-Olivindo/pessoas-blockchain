#       POSTGRES_USER: user
#       POSTGRES_PASSWORD: password
#       POSTGRES_DB: gestao_pessoas
#     ports:
#       - "5432:5432"
#     volumes:
#       - postgres_data:/var/lib/postgresql/data
#
# volumes:
#   postgres_data:

services: {}
