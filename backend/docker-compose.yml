services:
  postgres:
    image: postgres:16
    container_name: gestao_pessoas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gestao_pessoas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d gestao_pessoas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
